<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --bg-0: #020408;
        }
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-0);
            color: white;
            cursor: none;
            overflow-x: hidden;
        }
        .custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--cyan);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: background 0.3s;
        }
        .custom-cursor-inner {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: red;
            position: absolute;
            top: 10px;
            left: 10px;
            transition: background 0.3s;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            transition: all 0.5s;
        }
        .navbar-link:hover {
            text-decoration: underline;
        }
        .privacy-section {
            border-left: 5px solid var(--cyan);
            margin: 20px;
            padding: 20px;
            animation: fadeUp 0.5s;
        }
        footer {
            background-color: var(--bg-0);
            text-align: center;
            padding: 20px;
            position: relative;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div><div class="custom-cursor-inner"></div>
    <nav>
        <div class="brand">Seraphim Security</div>
        <div class="navbar-links">
            <a href="index.html" class="navbar-link">Home</a>
            <a href="index.html#about" class="navbar-link">About</a>
            <a href="index.html#contact" class="navbar-link">Contact</a>
        </div>
    </nav>
    <main>
        <section class="privacy-section">
            <h2>Privacy Policy</h2>
            <p>Your privacy is important to us...</p>
            <!-- More sections as needed -->
        </section>
    </main>
    <footer>
        <p>Status: Operational</p>
        <p>&copy; 2026 Seraphim Security</p>
    </footer>
    <script>
        const cursor = document.querySelector('.custom-cursor');
        const cursorInner = document.querySelector('.custom-cursor-inner');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.pageX + 'px';
            cursor.style.top = e.pageY + 'px';
            cursorInner.style.left = (e.pageX + 10) + 'px';
            cursorInner.style.top = (e.pageY + 10) + 'px';
        });
        document.addEventListener('mouseenter', () => {
           cursor.style.display = 'block';
           cursorInner.style.display = 'block';
        });
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
            cursorInner.style.display = 'none';
        });
        // Scroll detection and navbar animation not implemented here
    </script>
</body>
</html>
